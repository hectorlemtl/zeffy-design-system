<!doctype html>
<link rel="stylesheet" href="../../tokens/tokens.css">
<style>
  .zf-logos { background: var(--color-surface-muted); padding: var(--space-xxlarge) var(--space-padding-global); font-family: var(--font-family-body); }
  .zf-logos__inner { max-width: var(--container-regular); margin: 0 auto; text-align: center; }
  .zf-logos__heading { color: var(--color-text-secondary); font-size: var(--font-size-regular); letter-spacing: var(--letter-spacing-wide); text-transform: uppercase; font-weight: var(--font-weight-medium); margin: 0 0 var(--space-xlarge); }
  .zf-logos__row { display: flex; justify-content: space-around; align-items: center; gap: var(--space-xhuge); flex-wrap: wrap; }
  .zf-logos__logo { max-height: 48px; width: auto; opacity: 0.7; filter: grayscale(100%); transition: opacity var(--duration-fast), filter var(--duration-fast); }
  .zf-logos__logo:hover { opacity: 1; filter: grayscale(0); }
</style>

<section class="zf-logos">
  <div class="zf-logos__inner">
    <p class="zf-logos__heading">Trusted by 100,000+ nonprofits</p>
    <div class="zf-logos__row">
      <img class="zf-logos__logo" src="" alt="Worthy Dog Rescue">
      <img class="zf-logos__logo" src="" alt="Kids Cancer Care">
      <img class="zf-logos__logo" src="" alt="Boys &amp; Girls Clubs of America">
      <img class="zf-logos__logo" src="" alt="Food Bank">
      <img class="zf-logos__logo" src="" alt="Local Arts">
    </div>
  </div>
</section>
