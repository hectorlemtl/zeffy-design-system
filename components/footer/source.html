<!doctype html>
<link rel="stylesheet" href="../../tokens/tokens.css">
<style>
  .zf-footer { background: var(--color-surface-muted); color: var(--color-text-primary); font-family: var(--font-family-body); padding: var(--space-xhuge) var(--space-padding-global) var(--space-xlarge); }
  .zf-footer__inner { max-width: 1280px; margin: 0 auto; display: grid; grid-template-columns: 1fr 4fr; gap: var(--space-xhuge); }
  .zf-footer__cols { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: var(--space-xlarge); }
  .zf-footer__heading { text-transform: uppercase; letter-spacing: var(--letter-spacing-wide); color: var(--color-text-secondary); font-weight: var(--font-weight-medium); font-size: var(--font-size-xs); margin: 0 0 var(--space-medium); }
  .zf-footer__list { list-style: none; margin: 0; padding: 0; display: flex; flex-direction: column; gap: var(--space-xsmall); }
  .zf-footer__link { color: var(--color-text-primary); text-decoration: none; font-size: var(--font-size-regular); }
  .zf-footer__link:hover { color: var(--color-brand-primary); }
  .zf-footer__legal { border-top: 1px solid var(--color-neutral-slate-alpha); margin-top: var(--space-xhuge); padding-top: var(--space-large); color: var(--color-text-secondary); font-size: var(--font-size-xs); display: flex; gap: var(--space-medium); }
</style>
