<!doctype html>
<link rel="stylesheet" href="../../tokens/tokens.css">
<style>
  .zf-section              { font-family: var(--font-family-body); color: var(--color-text-primary); }
  .zf-section__global-pad  { padding-left: var(--space-padding-global); padding-right: var(--space-padding-global); }
  .zf-section__container   { max-width: var(--container-regular); margin: 0 auto; }
  .zf-section__v-sm        { padding-top: var(--space-xxlarge); padding-bottom: var(--space-xxlarge); }
  .zf-section__v-md        { padding-top: var(--space-huge);    padding-bottom: var(--space-huge); }
  .zf-section__v-lg        { padding-top: var(--space-xhuge);   padding-bottom: var(--space-xhuge); }
  .zf-section--muted       { background: var(--color-surface-muted); }
  .zf-section--brand-quiet { background: var(--color-surface-secondary); }
  .zf-section--brand       { background: var(--color-surface-brand); color: var(--color-text-inverted); }
  .zf-section--brand-deep  { background: var(--color-surface-brand-deep); color: var(--color-text-inverted); }
</style>

<section class="zf-section zf-section--brand-quiet">
  <div class="zf-section__global-pad zf-section__v-md">
    <div class="zf-section__container">
      <!-- content -->
    </div>
  </div>
</section>
