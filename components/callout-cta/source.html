<!doctype html>
<link rel="stylesheet" href="../../tokens/tokens.css">
<style>
  .zf-callout {
    background: var(--color-surface-brand-deep);
    color: var(--color-text-inverted);
    padding: var(--space-xhuge) var(--space-padding-global);
    text-align: center;
    font-family: var(--font-family-body);
  }
  .zf-callout__inner { max-width: var(--container-regular); margin: 0 auto; }
  .zf-callout__title {
    font-family: var(--font-family-heading);
    font-size: var(--font-size-4xl);
    font-weight: var(--font-weight-medium);
    line-height: var(--line-height-tight);
    margin: 0 0 var(--space-medium);
  }
  .zf-callout__sub {
    font-size: var(--font-size-medium-2);
    color: var(--color-text-inverted-secondary);
    max-width: 38rem;
    margin: 0 auto var(--space-xlarge);
  }
  .zf-callout__btn {
    background: var(--color-brand-primary);
    color: var(--color-text-inverted);
    padding: 16px 24px;
    border-radius: var(--radius-8);
    font-weight: var(--font-weight-medium);
    text-decoration: none;
    display: inline-block;
  }
</style>

<section class="zf-callout">
  <div class="zf-callout__inner">
    <h2 class="zf-callout__title">Start fundraising — it's free forever</h2>
    <p class="zf-callout__sub">Join 100,000+ nonprofits raising more with zero platform fees.</p>
    <a class="zf-callout__btn" href="#">Sign up for free</a>
  </div>
</section>
